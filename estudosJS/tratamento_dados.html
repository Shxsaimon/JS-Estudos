<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site</title>

    <style>
        body {
            background-color: #1a1641;
            font-family: Arial, sans-serif;
            color: #ffffff;
            font-size: 20px;
        }

        .container {
            margin: 10px 50px 10px 50px;
            padding: 20px;
            background-color: #333366;
            border-radius: 8px;
        }

        .button {
            background-color: #00bdca;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .button:hover {
            background-color: #ffffff;
            color: #00bdca;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Tratamendo de dados!!!</h1>

    </div>
    <div id="dados" class="container">

    </div>

    <script>
        var textos = document.getElementById('dados')
        // Captura os dados (vêm como String)
        var n1 = Number(window.prompt('Digite um número: '))
        var n2 = Number(window.prompt('Digite outro número: '))

        // Realiza a soma
        var s = n1 + n2

        var nome = window.prompt('Qual é o seu nome?')
        var idade = Number(window.prompt('Qual sua idade?'))

        var salario = Number(window.prompt('Qual o seu salário atual?'))

        // Fixando casas decimais (Ex: 1500.5)
        console.log(salario.toFixed(2))

        // Trocando ponto por vírgula manualmente
        console.log(salario.toFixed(2).replace('.', ','))

        // Formatação automática para Real Brasileiro (R$)
        var formatado = salario.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })

        var mensagem = `A soma dos valores é ${s}.<br/>` + `Olá, <strong>${nome}</strong>! Seu nome tem ${nome.length} letras.<br/>` + `Seu nome em maiúsculas é ${nome.toUpperCase()}.<br/>` + `Você tem ${idade} anos. Daqui a 10 anos terá ${idade + 10} anos.` + `<br/>` + `Seu salário atual é ${formatado}.`
        // Exibe o resultado usando concatenação moderna // armazenando as mensagens em uma variavel para depois escrever no html com innerHTML

        textos.innerHTML = mensagem
        
        
    </script>
</body>

</html>
