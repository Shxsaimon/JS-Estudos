<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScriptando</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="icon" type="image/png" href="style/javascriptandoroxo.png">
</head>

<body>
    <div class="container">
        <h1>Condicionais!!!</h1>
    </div>
    
    <div class="container">
        <h2>Sistemas de Radar</h2>
        <div class="conteudo">
            <p id="limitevelocidade"></p>
        </div>
        <div class="conteudo">
            <input type="number" id="velocidade" placeholder="Digite a velocidade do carro" title="Digite a velocidade do carro">
            <button class="button" onclick="verificarVelocidade()">Verificar Velocidade</button>
        </div>
        <div class="conteudo">
            <h3 id="mensagemvelocidade">Insira a velocidade para verificar</h3>
        </div>
    </div>
    
    <div class="container">
        <h2>Sistemas de Votação</h2>
        <div class="conteudo">
            <p id="idadevoto"></p>
        </div>
        <div class="conteudo">
            <input type="number" id="idade" placeholder="Digite a idade do eleitor" title="Digite a idade do eleitor">
            <button class="button" onclick="verificarIdade()">Verificar Idade</button>
        </div>
        <div class="conteudo">
            <h3 id="mensagemidade">Insira a idade para verificar</h3>
        </div>
    </div>

    <div class="container">
        <h2>Sistemas de Cálculo de Data</h2>
        <div class="conteudo">
            <p id="titulo-data">Calcule a Data</p>
        </div>
        <div class="conteudo">
            <input type="date" id="data" title="Digite a data">
            <button class="button" onclick="verificarData()">Verificar Data</button>
        </div>
        <div class="conteudo">
            <h3 id="mensagemdiasemana">Insira a data para verificar o dia</h3>
        </div>
    </div>
    <script src="condicionais.js"></script>
</body>

</html>
