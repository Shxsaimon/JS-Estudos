<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Idade</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="icon" type="image/png" href="style/sexo.png">
</head>
<header>
    <div id="cabecalho">
        <h1 id="tituloverificar">Verificar Idade</h1>
    </div>
</header>

<body id="bodyverifica">
    <div id="conteudoverifica">
        <div id="verificaridade">
            <div class="campo-data">
                <label for="inputidade">Data de nascimento:</label>
                <input type="date" id="inputidade" name="idade">
            </div>
            <div class="campo-sexo">
                <label>Sexo:</label>
                <input type="radio" name="sexo" value="masculino"> Masculino
                <input type="radio" name="sexo" value="feminino"> Feminino
            </div>
            <button id="botao-verificar" onclick="verificarIdade()">Verificar</button>
            <p id="resultado"></p>
            <div id="imagem-verificar"></div>
        </div>
    </div>
    <footer id="rodape">
        <p id="rodape-text">©2026 Desenvolvido por <a href="https://github.com/Shxsaimon" target="_blank">Shxsaimon</a></p>
    </footer>
    <script src="script/verificar_idade.js"></script>
</body>

</html>
