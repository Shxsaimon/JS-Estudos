<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="icon" type="image/png" href="style/img/contador_passo.png">
</head>
<header>
    <div>
        <h1 id="titulocontador">Contador</h1>
    </div>
</header>

<body id="bodycontador">
    <section id="contador">
        <div class="container-contador">
            <div>
                <label for="numinicio">Início:</label>
                <input type="number" id="numinicio" placeholder="Digite o número inicial">
            </div>
            <div>
                <label for="numfim">Fim:</label>
                <input type="number" id="numfim" placeholder="Digite o número final">
            </div>
            <div>
                <label for="passo">Passo:</label>
                <input type="number" id="passo" placeholder="Digite o passo ">
            </div>
            <button id="btnContar" class="button" onclick="contarComPasso()">Contar</button>
        </div>
            <div id="resultado">
                <pre class="codigo-execucao" id="execcontador" hidden></pre>
            </div>
    </section>

    <footer id="rodape" class="rodape-contador">
        <p id="rodape-text">©2026 Desenvolvido por <a href="https://github.com/Shxsaimon" target="_blank">Shxsaimon</a></p>
    </footer>
    <script src="script/contador.js"></script>
</body>

</html>
